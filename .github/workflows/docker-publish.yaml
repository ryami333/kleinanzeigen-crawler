# Builds a Docker image from the repository's Dockerfile and
# pushes it to the GitHub Container Registry (ghcr.io/<owner>/<repo>).
#
# ▶️ Triggers
#   • Manually via the "Run workflow" button (workflow_dispatch)
#
# 🛠️ Prerequisites
#   • The repository must contain a valid Dockerfile (default context is repo root)
#   • No extra secrets are needed—GITHUB_TOKEN is granted automatically with
#     the required permissions below

name: Build & Publish Docker image

on:
  workflow_dispatch:

# Minimal permissions for this job:
permissions:
  contents: read # checkout
  packages: write # push to ghcr.io

# Centralise image name so you only edit in one place
env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout source
        uses: actions/checkout@v4

      - name: ⚙️ Set up QEMU (cross‑arch emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all # ensures arm64 emulator is available

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true # makes `docker buildx` the default builder

      - name: 🔐 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: 💾 Restore Buildx cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            buildx-${{ github.ref }}-
            buildx-

      - name: 🏗️ Build & push (amd64 + arm64/v8)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
