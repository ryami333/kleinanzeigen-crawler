services:
  kleinanzeigen-crawler:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TZ: "Europe/Berlin"
      PORT: 5555
      GMAIL_PASS_FILE: /run/secrets/GMAIL_PASS
      AUTH_SECRET_FILE: /run/secrets/AUTH_SECRET
    ports:
      - "5555:5555"
    volumes:
      - ./redis-data:/data
    secrets:
      - GMAIL_PASS
      - AUTH_SECRET
secrets:
  GMAIL_PASS:
    file: ./secrets/GMAIL_PASS
  AUTH_SECRET:
    file: ./secrets/AUTH_SECRET
