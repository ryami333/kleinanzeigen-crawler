services:
  redis:
    image: redis:8-alpine
    networks:
      - kc-internal
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: node ./lib/worker.mjs
    env_file: .env
    environment:
      GMAIL_PASS_FILE: /run/secrets/GMAIL_PASS
      AUTH_SECRET_FILE: /run/secrets/AUTH_SECRET
    volumes:
      - ./redis-data:/data
    secrets:
      - GMAIL_PASS
      - AUTH_SECRET
    networks:
      - kc-internal
    depends_on:
      - redis
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    command: yarn next start
    env_file: .env
    environment:
      GMAIL_PASS_FILE: /run/secrets/GMAIL_PASS
      AUTH_SECRET_FILE: /run/secrets/AUTH_SECRET
    ports:
      - "5555:5555"
    volumes:
      - ./redis-data:/data
    secrets:
      - GMAIL_PASS
      - AUTH_SECRET
    networks:
      - kc-internal
    depends_on:
      - redis
secrets:
  GMAIL_PASS:
    file: ./secrets/GMAIL_PASS
  AUTH_SECRET:
    file: ./secrets/AUTH_SECRET
networks:
  kc-internal:
    driver: bridge
